name: Build Mod
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '7.3'
      - run: gradle build
      - uses: actions/upload-artifact@v4
        with:
          name: blackblock-mod
          path: build/libs/*.jar
